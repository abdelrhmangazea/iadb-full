<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Interior AI Design & Business System — IADB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1B3F6E;--navy-deep:#0D2545;--navy-base:#09182E;
  --blue:#1B6FB8;--blue-bright:#3E92D6;--cream:#F0EDE8;--white:#FFFFFF;
  --line:rgba(240,237,232,.14);--line-soft:rgba(240,237,232,.08);
  --muted:#9DB3CE;--shadow:0 24px 60px -28px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Cairo',sans-serif;color:var(--white);line-height:1.65;
  background:
    radial-gradient(130% 95% at 50% -12%, rgba(27,111,184,.22), transparent 58%),
    linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px) 0 0/46px 46px,
    linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px) 0 0/46px 46px,
    var(--navy-base);
  min-height:100vh;padding:clamp(18px,3.5vw,48px);
}

/* Header */
.head{display:flex;align-items:center;gap:clamp(16px,2.5vw,28px);max-width:1180px;margin:0 auto clamp(20px,3vw,32px);padding-bottom:clamp(18px,2.5vw,26px);border-bottom:1px solid var(--line)}
.seal{width:clamp(74px,9vw,100px);height:auto;flex:0 0 auto;filter:drop-shadow(0 8px 22px rgba(27,111,184,.45))}
.head-text{flex:1;min-width:0}
.eyebrow{font-size:clamp(10px,1.1vw,12px);letter-spacing:.34em;font-weight:600;color:var(--blue-bright);text-transform:uppercase;margin-bottom:8px}
.head-text h1{font-size:clamp(20px,3vw,34px);font-weight:800;line-height:1.2;letter-spacing:-.01em}
.head-text h1 .accent{color:var(--blue-bright)}
.pilltag{margin-top:9px;font-size:clamp(11px,1.25vw,14px);font-weight:600;color:var(--muted);letter-spacing:.03em}
.pilltag span{color:var(--cream)}

.wrap{max-width:1180px;margin:0 auto}

/* Systems (top level) */
.systems{display:flex;gap:clamp(8px,1.2vw,16px);flex-wrap:wrap;margin-bottom:clamp(16px,2.2vw,24px)}
.system{
  flex:1 1 280px;min-width:230px;display:flex;align-items:center;gap:14px;
  background:linear-gradient(180deg, rgba(27,63,110,.5), rgba(13,37,69,.5));
  border:1px solid var(--line);border-radius:16px;padding:16px 18px;cursor:pointer;text-align:right;
  transition:transform .25s ease,border-color .25s ease,background .25s ease,box-shadow .25s ease;
  position:relative;overflow:hidden;opacity:0;transform:translateY(14px);
}
.system::before{content:"";position:absolute;inset:0;border-radius:16px;background:linear-gradient(180deg,rgba(62,146,214,.16),transparent 70%);opacity:0;transition:opacity .25s ease}
.system:hover{transform:translateY(-3px);border-color:rgba(62,146,214,.55)}
.system:hover::before{opacity:1}
.system .dnum{width:48px;height:48px;flex:0 0 auto;border-radius:13px;display:grid;place-items:center;font-weight:800;font-size:17px;background:rgba(62,146,214,.16);color:var(--blue-bright);border:1px solid rgba(62,146,214,.4);letter-spacing:.02em;line-height:1}
.system .dnum small{display:block;font-size:8px;letter-spacing:.18em;font-weight:700;margin-bottom:2px;opacity:.85}
.system .sinfo{display:flex;flex-direction:column;line-height:1.3;min-width:0}
.system .sar{font-size:clamp(16px,1.9vw,20px);font-weight:800}
.system .sen{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.system.active{background:linear-gradient(180deg,var(--blue),var(--navy));border-color:var(--blue-bright);box-shadow:0 16px 38px -16px rgba(27,111,184,.85)}
.system.active .dnum{background:var(--cream);color:var(--navy-deep);border-color:var(--cream)}
.system.active .sen{color:var(--cream)}
.system.active .sar{color:var(--white)}

/* row label */
.rowlabel{font-size:12px;font-weight:700;color:var(--blue-bright);letter-spacing:.16em;margin:0 2px 12px;display:flex;align-items:center;gap:12px}
.rowlabel::after{content:"";flex:1;height:1px;background:var(--line)}

/* Stage tabs */
.stages{display:flex;gap:clamp(8px,1.1vw,14px);flex-wrap:wrap;margin-bottom:clamp(16px,2.4vw,26px)}
.stage{
  flex:1 1 172px;min-width:150px;background:linear-gradient(180deg,rgba(27,63,110,.42),rgba(13,37,69,.42));
  border:1px solid var(--line);border-radius:15px;padding:14px 15px;cursor:pointer;text-align:right;
  transition:transform .25s ease,border-color .25s ease,background .25s ease,box-shadow .25s ease;
  position:relative;overflow:hidden;opacity:0;transform:translateY(14px);
}
.stage::before{content:"";position:absolute;inset:0;border-radius:15px;background:linear-gradient(180deg,rgba(62,146,214,.16),transparent 70%);opacity:0;transition:opacity .25s ease}
.stage:hover{transform:translateY(-3px);border-color:rgba(62,146,214,.55)}
.stage:hover::before{opacity:1}
.stage .num{font-size:12px;font-weight:800;color:var(--blue-bright);letter-spacing:.12em;display:block;margin-bottom:6px}
.stage .ar{font-size:clamp(14px,1.6vw,17px);font-weight:700;line-height:1.3}
.stage .en{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:4px;display:block}
.stage.active{background:linear-gradient(180deg,var(--blue),var(--navy));border-color:var(--blue-bright);box-shadow:0 14px 34px -16px rgba(27,111,184,.8)}
.stage.active .num,.stage.active .en{color:var(--cream)}
.stage.active .ar{color:var(--white)}

/* Body grid */
.board{display:grid;grid-template-columns:1fr 268px;gap:clamp(14px,2vw,24px);align-items:start}
.panel{background:linear-gradient(180deg,rgba(27,63,110,.34),rgba(9,24,46,.55));border:1px solid var(--line);border-radius:20px;padding:clamp(22px,3vw,38px);min-height:360px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.panel::after{content:"";position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,transparent,var(--blue-bright),transparent);opacity:.7}

.pillars{display:flex;flex-direction:column;gap:10px}
.pillar{display:flex;align-items:center;gap:13px;background:rgba(13,37,69,.5);border:1px solid var(--line);border-radius:14px;padding:14px 15px;cursor:pointer;text-align:right;width:100%;color:var(--white);font-family:inherit;transition:border-color .22s ease,background .22s ease,transform .22s ease}
.pillar:hover{border-color:rgba(62,146,214,.6);transform:translateX(-3px)}
.pillar .badge{width:34px;height:34px;flex:0 0 auto;border-radius:9px;display:grid;place-items:center;font-weight:800;font-size:15px;background:rgba(62,146,214,.16);color:var(--blue-bright);border:1px solid rgba(62,146,214,.35);transition:all .22s ease}
.pillar .lab{line-height:1.25}
.pillar .lab .ar{font-size:16px;font-weight:700;display:block}
.pillar .lab .en{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.16em;text-transform:uppercase}
.pillar.active{background:linear-gradient(180deg,var(--blue),var(--navy));border-color:var(--blue-bright)}
.pillar.active .badge{background:var(--cream);color:var(--navy-deep);border-color:var(--cream)}
.pillar.active .lab .en{color:var(--cream)}

.p-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.p-head .kicker{font-size:11px;letter-spacing:.24em;font-weight:700;text-transform:uppercase;color:var(--blue-bright)}
.p-head .stagechip{margin-inline-start:auto;font-size:12px;font-weight:600;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:4px 13px}
.p-title{font-size:clamp(22px,2.8vw,30px);font-weight:800;margin-bottom:14px;line-height:1.25}
.p-title .en{font-size:.5em;font-weight:600;color:var(--muted);letter-spacing:.18em;margin-inline-start:10px;text-transform:uppercase}
.lead{font-size:clamp(15px,1.7vw,17.5px);color:#E4ECF6;margin-bottom:18px;font-weight:500}
.points{list-style:none;display:flex;flex-direction:column;gap:11px}
.points li{position:relative;padding-right:26px;font-size:clamp(14px,1.5vw,15.5px);color:#CFDBEC;font-weight:500}
.points li::before{content:"";position:absolute;right:0;top:.62em;width:9px;height:9px;border-radius:3px;background:var(--blue-bright);box-shadow:0 0 0 4px rgba(62,146,214,.15)}
.note{margin-top:20px;padding:13px 16px;border-radius:12px;font-size:14px;font-weight:600;background:rgba(62,146,214,.1);border:1px solid rgba(62,146,214,.3);color:#DCE8F6}
.note.warn{background:rgba(240,237,232,.07);border-color:var(--line)}
.note b{color:var(--cream)}

.team-desc{font-size:clamp(15px,1.7vw,17px);color:#E4ECF6;margin-bottom:22px;font-weight:500}
.tools{display:flex;flex-direction:column;gap:13px}
.tool-btn{display:flex;align-items:center;gap:14px;text-decoration:none;background:linear-gradient(180deg,var(--cream),#E3DDD2);color:var(--navy-deep);border-radius:14px;padding:16px 20px;font-weight:800;font-size:clamp(15px,1.7vw,17px);transition:transform .2s ease,box-shadow .2s ease;border:1px solid rgba(0,0,0,.06)}
.tool-btn:hover{transform:translateY(-2px);box-shadow:0 16px 34px -16px rgba(0,0,0,.6)}
.tool-btn .ico{width:38px;height:38px;flex:0 0 auto;border-radius:10px;display:grid;place-items:center;background:var(--blue);color:#fff}
.tool-btn .ico svg{width:19px;height:19px}
.tool-btn .tnames{display:flex;flex-direction:column;line-height:1.2;flex:1}
.tool-btn .tnames small{font-size:11px;font-weight:600;color:var(--navy);letter-spacing:.04em;margin-top:2px}
.tool-btn .arrow{margin-inline-start:auto;color:var(--navy);transition:transform .2s ease}
.tool-btn:hover .arrow{transform:translateX(-5px)}

.foot{max-width:1180px;margin:clamp(20px,3vw,30px) auto 0;text-align:center;font-size:12px;color:var(--muted);letter-spacing:.05em}
.foot b{color:var(--cream)}

@keyframes rise{to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.anim{animation:fadeIn .4s ease both}

@media(max-width:760px){
  .board{grid-template-columns:1fr}
  .pillars{flex-direction:row;flex-wrap:wrap}
  .pillar{flex:1 1 130px}
  .pillar:hover{transform:none}
}
</style>
</head>

let curSys = 0, curStage = 0, curPillar = 'vision';

function renderSystems(){
  const el = document.getElementById('systems');
  el.innerHTML = SYSTEMS.map((s,i)=>`
    <button class="system ${i===curSys?'active':''}" data-i="${i}" style="animation:rise .5s ease forwards;animation-delay:${i*0.08}s">
      <span class="dnum"><small>DAY</small>${s.day}</span>
      <span class="sinfo">
        <span class="sar">${s.ar}</span>
        <span class="sen">${s.en} · ${s.countLabel}</span>
      </span>
    </button>`).join('');
  el.querySelectorAll('.system').forEach(b=>b.onclick=()=>{curSys=+b.dataset.i;curStage=0;curPillar='vision';renderSystems();renderStages();renderPillars();renderPanel();});
}

function renderStages(){
  const sys = SYSTEMS[curSys];
  document.getElementById('rowlabel').innerHTML = `<span>${sys.ar}</span>`;
  const el = document.getElementById('stages');
  el.innerHTML = sys.stages.map((s,i)=>`
    <button class="stage ${i===curStage?'active':''}" data-i="${i}" style="animation:rise .45s ease forwards;animation-delay:${i*0.06}s">
      <span class="num">${s.num}</span>
      <span class="ar">${s.ar}</span>
      <span class="en">${s.en}</span>
    </button>`).join('');
  el.querySelectorAll('.stage').forEach(b=>b.onclick=()=>{curStage=+b.dataset.i;curPillar='vision';renderStages();renderPillars();renderPanel();});
}

function renderPillars(){
  const el = document.getElementById('pillars');
  el.innerHTML = PILLARS.map(p=>`
    <button class="pillar ${p.key===curPillar?'active':''}" data-k="${p.key}">
      <span class="badge">${p.letter}</span>
      <span class="lab"><span class="ar">${p.ar}</span><span class="en">${p.en}</span></span>
    </button>`).join('');
  el.querySelectorAll('.pillar').forEach(b=>b.onclick=()=>{curPillar=b.dataset.k;renderPillars();renderPanel();});
}

function renderPanel(){
  const sys = SYSTEMS[curSys];
  const s = sys.stages[curStage];
  const pMeta = PILLARS.find(p=>p.key===curPillar);
  let inner = '';

  if(curPillar==='team'){
    inner = `<p class="team-desc">${s.teamDesc}</p><div class="tools">` +
      s.tools.map(t=>`
        <a class="tool-btn" href="${t.url}" target="_blank" rel="noopener">
          <span class="ico">${ICON_LINK}</span>
          <span class="tnames">${t.name}<small>${t.sub}</small></span>
          ${ARROW}
        </a>`).join('') + `</div>`;
  } else {
    const d = s[curPillar];
    inner = `<p class="lead">${d.lead}</p><ul class="points">` +
      d.points.map(pt=>`<li>${pt}</li>`).join('') + `</ul>`;
    if(d.note) inner += `<div class="note ${d.warn?'warn':''}">${d.note}</div>`;
  }

  document.getElementById('panel').innerHTML = `
    <div class="p-head">
      <span class="kicker">اليوم ${sys.day} · ${sys.en}</span>
      <span class="stagechip">${s.ar}</span>
    </div>
    <h2 class="p-title">${pMeta.ar}<span class="en">${pMeta.en}</span></h2>
    <div class="anim" key="${curSys}-${curStage}-${curPillar}">${inner}</div>`;
}

renderSystems();
renderStages();
renderPillars();
renderPanel();
</script>
